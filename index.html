<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grain Conversation Starters</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }

    #app {
      background: #0f0f0f;
      color: #f0ede6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 100vw;
      height: 100vh;
      padding: 28px 40px 22px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .grain-logo {
      height: 48px;
      width: auto;
      opacity: 0.92;
    }

    .header-divider {
      width: 1px;
      height: 36px;
      background: #2a2a2a;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 500;
      color: #9ab59e;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-sub {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.03em;
    }

    .kalshi-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #0d1f18;
      border: 0.5px solid #1e3d2e;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 500;
      color: #4DE4B2;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .kalshi-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4DE4B2;
      animation: pulse 2s infinite;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #555;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #9ab59e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #timer-ring {
      width: 36px;
      height: 36px;
      transform: rotate(-90deg);
    }

    #timer-ring circle.track {
      fill: none;
      stroke: #1e1e1e;
      stroke-width: 3;
    }

    #timer-ring circle.progress {
      fill: none;
      stroke: #9ab59e;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    #card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    .mkt-card {
      background: #161616;
      border: 0.5px solid #242424;
      border-radius: 14px;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .mkt-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .cat-badge {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 14px;
    }

    .card-question {
      font-size: 21px;
      font-weight: 400;
      line-height: 1.35;
      color: #e8e4dc;
      flex: 1;
      margin-bottom: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .odds-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .yes-pct {
      font-size: 36px;
      font-weight: 500;
      line-height: 1;
    }

    .yes-label {
      font-size: 12px;
      color: #444;
      margin-left: 5px;
    }

    .no-label {
      font-size: 15px;
      color: #383838;
    }

    .bar-track {
      width: 100%;
      height: 3px;
      background: #202020;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .bar-fill { height: 100%; border-radius: 2px; }

    .outcomes-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .outcome-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .outcome-label {
      font-size: 14px;
      color: #b0aba2;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .outcome-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .outcome-pct {
      font-size: 18px;
      font-weight: 500;
      min-width: 44px;
      text-align: right;
    }

    .outcome-bar-track {
      width: 60px;
      height: 3px;
      background: #202020;
      border-radius: 2px;
      overflow: hidden;
    }

    .outcome-bar-fill {
      height: 100%;
      border-radius: 2px;
    }

    .vol-line {
      font-size: 13px;
      font-weight: 500;
      color: #7a6a3a;
      margin-top: 6px;
      letter-spacing: 0.01em;
    }

    /* Grain green -- Philly / Delaware */
    .grain-color  { color: #9ab59e; }
    .grain-badge  { background: #1a2e1c; color: #9ab59e; }
    .grain-bar    { background: #9ab59e; }

    /* Sports -- muted blue */
    .sport-color  { color: #6b9fc5; }
    .sport-badge  { background: #0e2233; color: #8ab8d8; }
    .sport-bar    { background: #6b9fc5; }

    /* Pop culture -- warm amber */
    .pop-color    { color: #c49a52; }
    .pop-badge    { background: #2a1e08; color: #d4aa6a; }
    .pop-bar      { background: #c49a52; }

    /* Wild card -- coral / warm red */
    .wild-color   { color: #c97c5a; }
    .wild-badge   { background: #2e1208; color: #d9956e; }
    .wild-bar     { background: #c97c5a; }

    #footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex-shrink: 0;
      padding-top: 2px;
      position: relative;
    }

    .page-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #222;
      transition: background 0.3s;
    }

    .page-dot.active { background: #9ab59e; }

    #loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #333;
      font-size: 14px;
    }
  </style>
</head>

<script>

const KALSHI_SPORTS_CATS = ['sports', 'basketball', 'football', 'baseball', 'hockey', 'soccer', 'golf', 'tennis', 'mma', 'boxing', 'racing', 'olympics'];
const KALSHI_POP_CATS    = ['entertainment', 'music', 'movies', 'tv', 'celebrity', 'awards', 'pop culture', 'media'];

// Keyword overrides -- these bump a market regardless of Kalshi category
const PHILLY_KEYWORDS = [
  'eagle','philly','philadelphia','sixers','phillies','flyers','union',
  'penn state','villanova','delaware','temple','drexel','birds',
  'hurts','sirianni','dover','wilmington','newark','blue hens'
];
const SPORT_KEYWORDS = [
  'nfl','nba','mlb','nhl','super bowl','playoff','championship','mvp',
  'draft','stanley cup','world series','finals','ncaa','march madness',
  'quarterback','touchdown','season','win','title','league','tournament',
  'cup','bowl','series','coach','roster','trade'
];
const POP_KEYWORDS = [
  'oscar','grammy','emmy','taylor swift','beyonce','movie','film','box office',
  'netflix','spotify','album','award','celebrity','reality show',
  'artist','song','billboard','actor','actress','singer','concert','tour'
];
const WILDCARD_KEYWORDS = [
  'elon','kanye','ye','musk','kardashian','alien','ufo','volcano','meteor',
  'mars','moon','apocalypse','resign','arrested','impeach','marry','divorce',
  'retire','fired','quit','pope','president','ai takeover','time travel'
];
const BLOCKLIST = [
  'fed funds rate','basis point','10-year yield','s&p 500 index',
  'nasdaq index','dow jones','crude oil price','bitcoin price','ethereum price'
];

function isWildcard(title) {
  const t = (title || '').toLowerCase();
  return WILDCARD_KEYWORDS.some(k => t.includes(k));
}

function classifyByKalshiCat(cat) {
  const c = (cat || '').toLowerCase();
  if (KALSHI_SPORTS_CATS.some(k => c.includes(k))) return 'sports';
  if (KALSHI_POP_CATS.some(k => c.includes(k)))    return 'pop';
  if (KALSHI_WILD_CATS.some(k => c.includes(k)))   return 'wildcard';
  return null;
}

function classify(title, yes, kalshiCat) {
  const t = (title || '').toLowerCase();
  if (BLOCKLIST.some(k => t.includes(k))) return null;
  // Keyword overrides take priority
  if (PHILLY_KEYWORDS.some(k => t.includes(k))) return 'philly';
  if (SPORT_KEYWORDS.some(k => t.includes(k)))  return 'sports';
  if (POP_KEYWORDS.some(k => t.includes(k)))    return 'pop';
  if (isWildcard(title)) return 'wildcard';
  // Fall back to Kalshi's own category
  const catFromKalshi = classifyByKalshiCat(kalshiCat);
  if (catFromKalshi) return catFromKalshi;
  // Accept anything that reads as a clear question -- bar guests can engage with any topic
  if (/^(will|who|what|when|which|how many|does|is |are |can |has )/i.test(title)) return 'wildcard';
  return null;
}

function barScore(market) {
  const t = (market.title || '').toLowerCase();
  // Accept pre-computed yes (0-100) or derive from dollar fields
  const yes = market.yes !== undefined ? market.yes
    : market.yes_bid_dollars !== undefined ? Math.round(market.yes_bid_dollars * 100)
    : 50;
  let score = 0;
  if (PHILLY_KEYWORDS.some(k => t.includes(k))) score += 55;
  if (isWildcard(market.title)) score += 35;
  const tension = 50 - Math.abs(yes - 50);
  score += tension * 1.5;
  if (yes >= 5 && yes <= 20) score += 15;
  const words = (market.title || '').split(' ').length;
  if (words >= 6 && words <= 18) score += 10;
  if (yes < 10 || yes > 90) score -= 20;
  if (yes < 5 || yes > 95) return -999;
  const vol = parseFloat(market.volume || 0);
  if (vol > 0) score += Math.min(25, Math.log10(vol + 1) * 6);
  return score;
}

    while (slide.length < 4 && ri < rest.length) { slide.push(rest[ri++]); }

  return out.length ? out : [fb.slice(0, 4)];
}

async function fetchMarkets() {
  try {
    // Fetch events (clean human-readable titles) rather than raw market contracts
    let all = [];
    const seedUrl = API + '/events?status=open&limit=200&with_nested_markets=true';
    let nextCursor = null;
    let pageCount = 0;
    const MAX_PAGES = 8;

    do {
      const url = nextCursor ? seedUrl + '&cursor=' + encodeURIComponent(nextCursor) : seedUrl;
      try {
        const r = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!r.ok) break;
        const data = await r.json();
        const events = data.events || [];
        if (events.length === 0) break;

        for (const ev of events) {
          const evTitle = ev.title || '';
          if (!evTitle || evTitle.length < 10) continue;

          const markets = (ev.markets || []).filter(mk => {
            const bid  = parseFloat(mk.yes_bid_dollars  || '0');
            const ask  = parseFloat(mk.yes_ask_dollars  || '0');
            const last = parseFloat(mk.last_price_dollars || '0');
            return bid > 0 || ask > 0 || last > 0;
          });

          if (markets.length === 0) continue;

          const totalVol = markets.reduce((s, mk) => s + parseFloat(mk.volume_fp || '0'), 0);

          if (markets.length === 1) {
            // Binary yes/no market
            const mk = markets[0];
            const bid  = parseFloat(mk.yes_bid_dollars  || '0');
            const ask  = parseFloat(mk.yes_ask_dollars  || '0');
            const last = parseFloat(mk.last_price_dollars || '0');
            const yesFrac = bid > 0 ? bid : ask > 0 ? (1 - ask) : last;
            const yes = Math.max(1, Math.min(99, Math.round(yesFrac * 100)));
            all.push({
              title: evTitle,
              yes,
              volume: Math.round(totalVol),
              category: ev.category || '',
              type: 'binary'
            });
          } else {
            // Multi-outcome -- score each outcome by its yes price (probability)
            const outcomes = markets.map(mk => {
              const bid  = parseFloat(mk.yes_bid_dollars  || '0');
              const ask  = parseFloat(mk.yes_ask_dollars  || '0');
              const last = parseFloat(mk.last_price_dollars || '0');
              const pct = Math.round((bid > 0 ? bid : ask > 0 ? (1 - ask) : last) * 100);
              // Try every possible label field
              const label = mk.yes_sub_title || mk.no_sub_title || mk.subtitle || mk.short_name || mk.custom_strike || '';
              return { label, pct, vol: parseFloat(mk.volume_fp || '0') };
            }).filter(o => o.label && o.pct > 0)
              .sort((a, b) => b.pct - a.pct)
              .slice(0, 3);

            if (outcomes.length >= 2) {
              all.push({
                title: evTitle,
                yes: outcomes[0].pct,
                volume: Math.round(totalVol),
                category: ev.category || '',
                type: 'multi',
                outcomes
              });
            }
          }
        }

        if (pageCount === 0) {
          const evs = data.events || [];
          console.log('Total events page 1:', evs.length);
          evs.slice(0, 5).forEach((ev, i) => {
            const mk = (ev.markets || [])[0] || {};
            console.log('EVENT ' + i + ':', ev.title || ev.event_ticker,
              '| cat:', ev.category,
              '| markets:', (ev.markets||[]).length,
              '| yes_bid:', mk.yes_bid_dollars,
              '| last_price:', mk.last_price_dollars,
              '| vol:', mk.volume_fp);
          });
          console.log('FULL first event:', JSON.stringify(evs[0], null, 2));
        }
        nextCursor = data.cursor || null;
        pageCount++;
      } catch(e) { console.log('fetch error', e); break; }
    } while (nextCursor && pageCount < MAX_PAGES);

    // Already processed into clean objects -- no further dedup needed by ticker
    const unique = all;

    // unique[] already has clean {title, yes, volume} -- just classify and score
    const scoredList = [];
    for (const m of unique) {
      if (!m.title || m.title.length < 10) continue;
      if (m.yes < 5 || m.yes > 95) continue;
      const cat = classify(m.title, m.yes, m.category);
      const sc = barScore({ title: m.title, yes: m.yes, volume: m.volume });
      if (cat && sc > -999) {
        scoredList.push({ title: m.title, yes: m.yes, category: cat, volume: m.volume, score: sc });
      }
    }
    scoredList.sort((a, b) => b.score - a.score);

    // Deduplicate by title
    const seenTitles = new Set();
    const deduped = [];
    for (const m of scoredList) {
      if (!seenTitles.has(m.title)) { deduped.push(m); seenTitles.add(m.title); }
    }

    // If we got very few results, loosen the filter and accept anything bar-readable
    let pool = deduped;
    if (pool.length < 20) {
      const extra = [];
      const extraSeen = new Set(seenTitles);
      for (const m of unique) {
        const mt = m.title || '';
        if (!mt || mt.length < 10 || extraSeen.has(mt)) continue;
        const yesBid2  = parseFloat(m.yes_bid_dollars  || '0');
        const yesAsk2  = parseFloat(m.yes_ask_dollars  || '0');
        const lastPx2  = parseFloat(m.last_price_dollars || '0');
        if (yesBid2 === 0 && yesAsk2 === 0 && lastPx2 === 0) continue;
        let yesFrac2 = yesBid2 > 0 ? yesBid2 : yesAsk2 > 0 ? (1 - yesAsk2) : lastPx2;
        const yes = Math.max(1, Math.min(99, Math.round(yesFrac2 * 100)));
        if (yes < 5 || yes > 95) continue;
        // Accept anything that starts with "Will" as a readable binary question
        const t2 = m.subtitle || m.title || '';
        if (/^will /i.test(t2) || /^(who|what|when|which|how many)/i.test(t2)) {
          const yesFrac2 = m.yes_bid_dollars ?? m.yes_ask_dollars ?? m.last_price_dollars ?? 0.5;
          const yes2 = Math.round(yesFrac2 * 100);
          const cat = classify(t2, yes2, m.category) || 'wildcard';
          extra.push({ title: t2, yes: yes2, category: cat, volume: Math.round(m.dollar_volume ?? m.volume_fp ?? 0), score: 10 });
          extraSeen.add(mt);
        }
      }
      pool = pool.concat(extra).slice(0, 240);
    }

    // Separate into pools
    const phillyPool   = pool.filter(m => m.category === 'philly');
    const wildcardPool = pool.filter(m => m.category === 'wildcard');
    const regularPool  = pool.filter(m => m.category !== 'wildcard' && m.category !== 'philly');

    // Merge wildcards + regulars by score
    const nonPhilly = [];
    let wi = 0, ri = 0;
    while (wi < wildcardPool.length || ri < regularPool.length) {
      const wScore = wi < wildcardPool.length ? wildcardPool[wi].score : -Infinity;
      const rScore = ri < regularPool.length  ? regularPool[ri].score  : -Infinity;
      if (wScore >= rScore) nonPhilly.push(wildcardPool[wi++]);
      else nonPhilly.push(regularPool[ri++]);
    }

    // Build slides: 1 recycling Philly + 3 unique non-Philly each
    const TARGET_SLIDES = 60;
    const builtSlides = [];
    let npIdx = 0;
    let phillyIdx = 0;

    while (builtSlides.length < TARGET_SLIDES && npIdx < nonPhilly.length) {
      const slide = [];
      let wcCount = 0;

      if (phillyPool.length > 0) {
        slide.push(phillyPool[phillyIdx % phillyPool.length]);
        phillyIdx++;
      }

      while (slide.length < 4 && npIdx < nonPhilly.length) {
        const m = nonPhilly[npIdx++];
        if (m.category === 'wildcard' && wcCount >= 2) continue;
        if (m.category === 'wildcard') wcCount++;
        slide.push(m);
      }

      if (slide.length < 4) {
        // Pad with fallback cards rather than drop the slide
        const fb = getFallback();
        while (slide.length < 4) slide.push(fb[slide.length % fb.length]);
      }

      for (let i = slide.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [slide[i], slide[j]] = [slide[j], slide[i]];
      }
      builtSlides.push(slide);
    }

    if (builtSlides.length > 0) {
      pages = builtSlides;
      statusMsg = 'Live: ' + unique.length + ' fetched, ' + pool.length + ' matched, ' + pages.length + ' slides';
    } else {
      pages = buildFallbackPages();
      statusMsg = 'Fallback: ' + pages.length + ' slides (no API matches)';
    }
    render();
    if (timerInterval === null) startTimer();
  } catch(e) {
    pages = buildFallbackPages();
    statusMsg = 'Error: ' + (e.message || e) + ' — fallback ' + pages.length + ' slides';
    render();
    if (timerInterval === null) startTimer();
  }
}

function cc(cat) {
  if (cat === 'philly') return 'grain';
  if (cat === 'sports') return 'sport';
  if (cat === 'wildcard') return 'wild';
  return 'pop';
}

function catLabel(cat) {
  if (cat === 'philly') return 'Philly / Delaware';
  if (cat === 'sports') return 'Sports';
  if (cat === 'wildcard') return 'Wild card';
  return 'Pop Culture';
}

function formatVol(v) {
  if (!v || v < 500) return '';
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M bet on this';
  if (v >= 1000) return '$' + Math.round(v / 1000) + 'K bet on this';
  return '$' + v + ' bet on this';
}

function render() {
  const app = document.getElementById('app');
  const existing = document.getElementById('card-grid');
  if (existing) existing.remove();
  const loading = document.getElementById('loading-msg');
  if (loading) loading.remove();

  const footer = document.getElementById('footer');
  footer.style.display = 'flex';
  footer.innerHTML =
    '<span style="font-size:10px;color:#2a2a2a;position:absolute;left:40px;">' + statusMsg + '</span>' +
    pages.map((_, i) =>
      '<div class="page-dot ' + (i === currentPage ? 'active' : '') + '"></div>'
    ).join('');

  const page = pages[currentPage] || [];
  const grid = document.createElement('div');
  grid.id = 'card-grid';

  page.forEach(function(m, i) {
    const c = cc(m.category);
    const card = document.createElement('div');
    card.className = 'mkt-card';
    const vol = formatVol(m.volume);
    const isMulti = m.type === 'multi' && m.outcomes && m.outcomes.length >= 2;

    if (isMulti) {
      const rows = m.outcomes.map(o =>
        '<div class="outcome-row">' +
          '<div class="outcome-label">' + o.label + '</div>' +
          '<div class="outcome-right">' +
            '<span class="outcome-pct ' + c + '-color">' + o.pct + '%</span>' +
            '<div class="outcome-bar-track"><div class="outcome-bar-fill ' + c + '-bar" style="width:' + Math.min(100, o.pct * 2) + '%"></div></div>' +
          '</div>' +
        '</div>'
      ).join('');
      card.innerHTML =
        '<div>' +
          '<span class="cat-badge ' + c + '-badge">' + catLabel(m.category) + '</span>' +
          '<div class="card-question" style="margin-bottom:10px;">' + m.title + '</div>' +
        '</div>' +
        '<div class="outcomes-block">' + rows + '</div>' +
        (vol ? '<div class="vol-line" style="margin-top:8px;">' + vol + '</div>' : '');
    } else {
      card.innerHTML =
        '<div>' +
          '<span class="cat-badge ' + c + '-badge">' + catLabel(m.category) + '</span>' +
          '<div class="card-question">' + m.title + '</div>' +
        '</div>' +
        '<div>' +
          '<div class="odds-row">' +
            '<div><span class="yes-pct ' + c + '-color">' + m.yes + '%</span><span class="yes-label">yes</span></div>' +
            '<span class="no-label">' + (100 - m.yes) + '% no</span>' +
          '</div>' +
          '<div class="bar-track"><div class="bar-fill ' + c + '-bar" style="width:' + m.yes + '%"></div></div>' +
          (vol ? '<div class="vol-line">' + vol + '</div>' : '') +
        '</div>';
    }
    grid.appendChild(card);
    setTimeout(function() { card.classList.add('visible'); }, 40 + i * 70);
  });

  setTimeout(fitText, 160);
  app.insertBefore(grid, footer);
}

function startTimer() {
  timerSec = SLIDE_DURATION;
  updateRing();
  timerInterval = setInterval(function() {
    timerSec--;
    updateRing();
    if (timerSec <= 0) {
      timerSec = SLIDE_DURATION;
      currentPage = (currentPage + 1) % pages.length;
      render();
    }
  }, 1000);
}

function updateRing() {
  const fill = document.getElementById('ring-fill');
  if (!fill) return;
  const progress = timerSec / SLIDE_DURATION;
  fill.style.strokeDashoffset = (CIRCUMFERENCE * (1 - progress)).toFixed(2);
}

function fitText() {
  const cards = document.querySelectorAll('.mkt-card');
  cards.forEach(function(card) {
    const qEl = card.querySelector('.card-question');
    if (!qEl) return;
    const bottom = card.querySelector('.card-bottom') || card.lastElementChild;
    const badge = card.querySelector('.cat-badge');
    const badgeH = badge ? badge.offsetHeight + 14 : 24;
    const bottomH = bottom ? bottom.offsetHeight : 80;
    const available = card.offsetHeight - badgeH - bottomH - 48;
    if (available <= 0) return;
    let size = 18;
    qEl.style.fontSize = size + 'px';
    while (size < 72 && qEl.scrollHeight <= available) {
      size += 1;
      qEl.style.fontSize = size + 'px';
    }
    qEl.style.fontSize = Math.max(18, size - 2) + 'px';
  });
}

fetchMarkets();
setInterval(fetchMarkets, 5 * 60 * 1000);
window.addEventListener('resize', function() { setTimeout(fitText, 100); });
